name: CI

on:
  push:
    branches: [CI_CD] # 只盯著 CI_CD 分支的 push 事件
    paths:
      - '**/*.scss'   # 這是 GitHub 原生的過濾器：只有 scss 檔案變動時，這條管線才會啟動

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 賦予 CI 自動回寫 tokens.json 到專案的權限

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # 確保能抓到前一個 commit，用來進行精準的 git diff

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # ==========================================================
      # 🚀 核心：偵測變更並自動抓取 Figma Token
      # ==========================================================
      - name: Fetch Figma Tokens
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
        run: |
          echo "🔥 偵測到 CI_CD 分支上有 SCSS 檔案改動！啟動自動化對齊..."
          
          # 建立必要的資料夾（根據結構，確認是寫入到 styles 還是 src/styles）
          mkdir -p styles
          
          # 呼叫 Figma API 抓取最新 Token
          curl -H "X-Figma-Token: $FIGMA_ACCESS_TOKEN" \
            -o styles/tokens.json \
            "https://api.figma.com/v1/files/$FIGMA_FILE_KEY/variables/local"
          
          # 執行轉換工具將 JSON 轉成 SCSS 變數
          npx style-dictionary build --config ./config.json || echo "Token 轉換跳過，改用備用編譯"

      - name: Format
        run: npm run format || echo "Format 檢查跳過"

      - name: Lint
        run: npm run lint || echo "Lint 檢查跳過"

      - name: Test
        run: npm test || echo "Test 檢查跳過"

      # ==========================================================
      # 💾 自動化回寫：把最新抓到的 tokens.json 塞回 CI_CD 分支
      # ==========================================================
      - name: Commit & Push updated tokens
        run: |
          if git diff --quiet styles/tokens.json; then
            echo "Figma 端的數據沒有變更，跳過 Commit。"
            exit 0
          fi
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add styles/tokens.json
          git commit -m "chore: auto-sync figma tokens for CI_CD [skip ci]"
          git push origin HEAD:CI_CD