name: Sync Design Tokens

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - tokens/**

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download tokens.json
        env:
          TOKENS_RAW_URL: ${{ secrets.TOKENS_RAW_URL }}
        run: |
          if [ -z "$TOKENS_RAW_URL" ]; then
            echo "Missing TOKENS_RAW_URL secret."
            exit 1
          fi
          curl -sSL "$TOKENS_RAW_URL" -o tokens/tokens.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build tokens
        run: npm run tokens:build

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No token changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tokens/tokens.json styles/tokens.scss
          git commit -m "chore: sync design tokens"
          git push
