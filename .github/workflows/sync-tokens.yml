name: Sync Design Tokens

on:
  workflow_dispatch: # 允許你手動在 GitHub 網頁按 Run workflow 
  # 如果未來想做到「設計師改 Figma 自動觸發」，這裡通常會改成 repository_dispatch

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 防呆：確保 tokens 資料夾存在，避免 curl 因為找不到資料夾而失敗
      - name: Ensure directory exists
        run: mkdir -p tokens styles

      - name: Download tokens.json
        env:
          TOKENS_RAW_URL: ${{ secrets.TOKENS_RAW_URL }}
        run: |
          if [ -z "$TOKENS_RAW_URL" ]; then
            echo "Missing TOKENS_RAW_URL secret."
            exit 1
          fi
          curl -sSL "$TOKENS_RAW_URL" -o tokens/tokens.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build tokens
        run: npm run tokens:build

      - name: Commit changes
        run: |
          # 檢查是否有任何檔案（包含新生成的）被改動
          if git diff --quiet && git status --porcelain | grep -q '^\?'; then
            echo "No token changes to commit."
            exit 0
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 自動追蹤所有相關變更
          git add tokens/tokens.json
          
          git add styles/     
          
          git commit -m "chore: sync design tokens"
          git push